name: API — Build, Test, Deploy

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    name: Build, Test & Deploy .NET API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/barkfest-api:${{ github.sha }}
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/barkfest-api:latest

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group rg-barkfest \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/barkfest-api:${{ github.sha }} \
            --set-env-vars \
              "ConnectionStrings__barkfest-db=${{ secrets.SQL_CONNECTION_STRING }}" \
              "ConnectionStrings__barkfest-blobs=${{ secrets.BLOB_CONNECTION_STRING }}" \
              "APPLICATIONINSIGHTS_CONNECTION_STRING=${{ secrets.APPINSIGHTS_CONNECTION_STRING }}" \
              "Jwt__SecretKey=${{ secrets.JWT_SECRET_KEY }}" \
              "Jwt__Issuer=barkfest-api" \
              "Jwt__Audience=barkfest-client" \
              "Jwt__ExpiryMinutes=60" \
              "Admin__Username=${{ secrets.ADMIN_USERNAME }}" \
              "Admin__Name=${{ secrets.ADMIN_NAME }}" \
              "Admin__Email=${{ secrets.ADMIN_EMAIL }}" \
              "Admin__PhoneNumber=${{ secrets.ADMIN_PHONE_NUMBER }}" \
              "Admin__Password=${{ secrets.ADMIN_PASSWORD }}" \
              "Cors__AllowedOrigin=${{ secrets.CORS_ALLOWED_ORIGIN }}" \
              "ASPNETCORE_ENVIRONMENT=Production"
